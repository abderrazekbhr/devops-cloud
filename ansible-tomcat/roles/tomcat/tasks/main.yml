---

- name: Ensure tomcat group exists
  group:
    name: "{{ tomcat_group }}"
    state: present

- name: Ensure tomcat user exists
  user:
    name: "{{ tomcat_user }}"
    group: "{{ tomcat_group }}"
    home: "{{ tomcat_install_dir }}"
    shell: /bin/false
    create_home: no
    state: present

- name: Install Java JDK
  apt:
    name: "{{ tomcat_java_pkg }}"
    state: present
    update_cache: yes

- name: Download Tomcat archive
  get_url:
    url: "{{ tomcat_archive_url }}"
    dest: "{{ tomcat_archive_dest }}"
  tags: tomcat_install

- name: Extract Tomcat archive
  unarchive:
    src: "{{ tomcat_archive_dest }}"
    dest: "{{ tomcat_install_dir }}"
    remote_src: yes
    owner: "{{ tomcat_user }}"
    group: "{{ tomcat_group }}"
    extra_opts:
      - --strip-components=1
  tags: tomcat_install

- name: Copy Tomcat system service template
  template:
    src: "{{ tomcat_service_file }}"
    dest: "/etc/systemd/system/{{ tomcat_service_name }}.service"
    owner: root
    group: root
  tags: tomcat_service

- name: Ensure Tomcat service is started and enabled
  systemd:
    name: "{{ tomcat_service_name }}"
    state: started
    enabled: yes
  tags: tomcat_service

- name: Deploy application WAR (if provided)
  copy:
    src: "{{ tomcat_app_source }}"
    dest: "{{ tomcat_app_dest }}"
    owner: "{{ tomcat_user }}"
    group: "{{ tomcat_group }}"
    mode: '0644'
  when: tomcat_app_war | length > 0
  notify: restart tomcat
  tags: tomcat_app
